name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ping valdiviesopatrimonio.cl
        run: |
          echo "=== Pinging central keep-alive ==="
          curl -s --max-time 30 "https://valdiviesopatrimonio.cl/api/keep-alive"
          echo ""

      - name: Heartbeat to keep repo alive
        run: |
          echo "$(date -u -Iseconds)" > .heartbeat
          git config user.name "keep-alive-bot"
          git config user.email "bot@keepalive.invalid"
          git add .heartbeat
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "auto: heartbeat $(date -u +%Y-%m-%d)"
            git push
          fi
